name: dat-ai
version: 1.0.0
description: "dat.ai browser automation, transcription, and LLM chat as native Hermes tools. Requires DAT_AI_API_KEY env var."
author: willtholke
kind: standalone
requires_env:
  - DAT_AI_API_KEY
provides_tools:
  - dat_browse
  - dat_browse_status
  - dat_browse_screenshot
  - dat_transcribe
  - dat_transcribe_status
  - dat_completions
  - dat_chat